name: Build

on: workflow_dispatch

jobs:
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ui
        run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

  build-core:
    name: Build core (${{ matrix.name }})
    needs: build-ui
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            binary: core/target/release/tolossy
          - os: windows-latest
            name: windows
            binary: core/target/release/tolossy.exe

    steps:
      - uses: actions/checkout@v4

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target/
          key: ${{ matrix.name }}-cargo-${{ hashFiles('core/Cargo.lock') }}

      - name: Build
        working-directory: core
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.name }}
          path: ${{ matrix.binary }}
